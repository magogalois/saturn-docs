<svg width="680" viewBox="0 0 680 460" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
<title>Conformer vs Fast-Conformer attention 비교</title>
<desc>기존 Conformer의 O(T²) 전역 어텐션과 Fast-Conformer의 O(T) 지역 어텐션(+ Global token) 구조 비교</desc>

<!-- 배경 -->
<rect width="680" height="460" fill="#ffffff"/>

<!-- 왼쪽: 기존 Conformer 제목 -->
<text x="160" y="32" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#2C2C2A">기존 Conformer</text>
<text x="160" y="52" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#5F5E5A">O(T²) 전역 어텐션</text>

<!-- 토큰 7개 (기존) -->
<rect x="52"  y="70" width="32" height="32" rx="4" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="68"  y="86" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#444441">t1</text>
<rect x="96"  y="70" width="32" height="32" rx="4" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="112" y="86" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#444441">t2</text>
<rect x="140" y="70" width="32" height="32" rx="4" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="156" y="86" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#444441">t3</text>
<rect x="184" y="70" width="32" height="32" rx="4" fill="#EEEDFE" stroke="#534AB7" stroke-width="1"/>
<text x="200" y="86" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="500" fill="#3C3489">t4</text>
<rect x="228" y="70" width="32" height="32" rx="4" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="244" y="86" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#444441">t5</text>
<rect x="272" y="70" width="32" height="32" rx="4" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="288" y="86" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#444441">t6</text>
<rect x="316" y="70" width="32" height="32" rx="4" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="332" y="86" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#444441">t7</text>

<!-- t4에서 모든 토큰으로 attention 선 -->
<line x1="200" y1="102" x2="68"  y2="140" stroke="#AFA9EC" stroke-width="1.5" opacity="0.7"/>
<line x1="200" y1="102" x2="112" y2="140" stroke="#AFA9EC" stroke-width="1.5" opacity="0.7"/>
<line x1="200" y1="102" x2="156" y2="140" stroke="#AFA9EC" stroke-width="1.5" opacity="0.7"/>
<line x1="200" y1="102" x2="200" y2="140" stroke="#7F77DD" stroke-width="2.5" opacity="0.9"/>
<line x1="200" y1="102" x2="244" y2="140" stroke="#AFA9EC" stroke-width="1.5" opacity="0.7"/>
<line x1="200" y1="102" x2="288" y2="140" stroke="#AFA9EC" stroke-width="1.5" opacity="0.7"/>
<line x1="200" y1="102" x2="332" y2="140" stroke="#AFA9EC" stroke-width="1.5" opacity="0.7"/>

<text x="160" y="158" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#5F5E5A">t4 가 모든 토큰 참조 → 메모리 O(T²)</text>

<rect x="100" y="172" width="120" height="28" rx="14" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.5"/>
<text x="160" y="186" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#791F1F">긴 문장에서 느림</text>

<!-- 구분선 -->
<line x1="345" y1="20" x2="345" y2="440" stroke="#D3D1C7" stroke-width="0.5" stroke-dasharray="4 3"/>

<!-- 오른쪽: Fast-Conformer 제목 -->
<text x="512" y="32" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#2C2C2A">Fast-Conformer</text>
<text x="512" y="52" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#5F5E5A">Local attention + Global token</text>

<!-- Global token -->
<circle cx="512" cy="86" r="18" fill="#FAEEDA" stroke="#854F0B" stroke-width="1"/>
<text x="512" y="86" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="500" fill="#633806">G</text>
<text x="512" y="114" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#5F5E5A">Global token</text>

<!-- 토큰 7개 (Fast) -->
<rect x="362" y="140" width="32" height="32" rx="4" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="378" y="156" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#444441">t1</text>
<rect x="406" y="140" width="32" height="32" rx="4" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="422" y="156" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#444441">t2</text>
<rect x="450" y="140" width="32" height="32" rx="4" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="466" y="156" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#444441">t3</text>
<rect x="494" y="140" width="32" height="32" rx="4" fill="#EEEDFE" stroke="#534AB7" stroke-width="1"/>
<text x="510" y="156" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="500" fill="#3C3489">t4</text>
<rect x="538" y="140" width="32" height="32" rx="4" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="554" y="156" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#444441">t5</text>
<rect x="582" y="140" width="32" height="32" rx="4" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="598" y="156" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#444441">t6</text>
<rect x="626" y="140" width="32" height="32" rx="4" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="642" y="156" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#444441">t7</text>

<!-- t4 → 인접 ±2 local attention -->
<line x1="510" y1="172" x2="422" y2="210" stroke="#AFA9EC" stroke-width="1.5" opacity="0.7"/>
<line x1="510" y1="172" x2="466" y2="210" stroke="#7F77DD" stroke-width="2" opacity="0.8"/>
<line x1="510" y1="172" x2="510" y2="210" stroke="#7F77DD" stroke-width="2.5" opacity="0.9"/>
<line x1="510" y1="172" x2="554" y2="210" stroke="#7F77DD" stroke-width="2" opacity="0.8"/>
<line x1="510" y1="172" x2="598" y2="210" stroke="#AFA9EC" stroke-width="1.5" opacity="0.7"/>

<!-- t4 → Global token -->
<path d="M510 140 Q510 100 512 104" fill="none" stroke="#EF9F27" stroke-width="2" stroke-dasharray="4 3"/>

<!-- Local window 표시 -->
<rect x="440" y="136" width="156" height="40" rx="4" fill="none" stroke="#7F77DD" stroke-width="1" stroke-dasharray="3 2" opacity="0.6"/>
<text x="518" y="132" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#534AB7">context window (±2)</text>

<text x="512" y="228" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#5F5E5A">t4는 ±context만 직접 참조, G로 전역 보완</text>

<rect x="412" y="242" width="200" height="28" rx="14" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="512" y="256" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#085041">O(T) — 실시간 스트리밍 가능</text>

<!-- 구분선 -->
<line x1="40" y1="285" x2="640" y2="285" stroke="#D3D1C7" stroke-width="0.5"/>

<!-- 핵심 수치 제목 -->
<text x="340" y="310" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#2C2C2A">Fast-Conformer 핵심 수치</text>

<!-- 카드 3개 -->
<rect x="50"  y="330" width="170" height="68" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="135" y="352" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#3C3489">Local context</text>
<text x="135" y="370" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#534AB7">±128 프레임</text>
<text x="135" y="386" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#534AB7">(약 10초 음성)</text>

<rect x="255" y="330" width="170" height="68" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="340" y="352" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#085041">Subsampling</text>
<text x="340" y="370" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#0F6E56">8× (vs 기존 4×)</text>
<text x="340" y="386" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#0F6E56">시퀀스 길이 절반</text>

<rect x="460" y="330" width="170" height="68" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text x="545" y="352" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#633806">속도 향상</text>
<text x="545" y="370" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#854F0B">~2.8× 빠름</text>
<text x="545" y="386" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#854F0B">(동일 정확도 유지)</text>

<!-- 범례 -->
<rect x="50"  y="416" width="10" height="10" rx="2" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="66" y="421" dominant-baseline="central" font-size="12" fill="#444441">Local attention</text>
<rect x="170" y="416" width="10" height="10" rx="2" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text x="186" y="421" dominant-baseline="central" font-size="12" fill="#444441">Global token attention</text>
<rect x="330" y="416" width="10" height="10" rx="2" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="346" y="421" dominant-baseline="central" font-size="12" fill="#444441">O(T) 복잡도</text>
</svg>
