<svg width="680" viewBox="0 0 680 820" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
<title>Fast-Conformer RNN-T 전체 아키텍처</title>
<desc>음성 입력부터 텍스트 출력까지 Fast-Conformer RNN-T의 세 가지 주요 구성요소(인코더, 프리딕터, 조인트 네트워크)의 구조와 연결 관계</desc>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="arrow-teal" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#1D9E75" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="arrow-purple" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#7F77DD" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="arrow-coral" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#993C1D" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="arrow-amber" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#854F0B" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- 배경 -->
<rect width="680" height="820" fill="#ffffff"/>

<!-- 입력 -->
<rect x="215" y="20" width="250" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="340" y="42" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#2C2C2A">음성 입력 (raw waveform)</text>

<line x1="340" y1="64" x2="340" y2="94" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- 특징 추출 -->
<rect x="215" y="96" width="250" height="56" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="340" y="116" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#2C2C2A">Log-Mel Filterbank</text>
<text x="340" y="136" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#5F5E5A">80-dim, 10ms frame shift</text>

<line x1="340" y1="152" x2="340" y2="182" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- ENCODER 컨테이너 -->
<rect x="40" y="184" width="600" height="300" rx="16" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="64" y="208" dominant-baseline="central" font-size="14" font-weight="500" fill="#3C3489">Encoder — Fast-Conformer</text>

<!-- Conv Subsampling -->
<rect x="70" y="218" width="540" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="340" y="238" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#085041">Depthwise Separable Conv Subsampling</text>
<text x="340" y="258" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#0F6E56">8x 다운샘플링 → 80ms 단위로 압축</text>

<line x1="340" y1="274" x2="340" y2="292" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arrow-teal)"/>

<!-- Conformer Block -->
<rect x="70" y="294" width="540" height="80" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="340" y="318" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#3C3489">Fast-Conformer Block × N (17~18층)</text>
<text x="340" y="338" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#534AB7">Feed-Forward → Local MHA (attention_context=128) → Conv → FF</text>
<text x="340" y="356" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#534AB7">Global token 추가로 장거리 의존성 처리</text>

<line x1="340" y1="374" x2="340" y2="392" stroke="#7F77DD" stroke-width="1.5" marker-end="url(#arrow-purple)"/>

<!-- Linear Projection -->
<rect x="70" y="394" width="540" height="44" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="340" y="416" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#3C3489">Linear Projection → encoder hidden (h_enc)</text>

<!-- 인코더 → 조인트 화살표 -->
<line x1="340" y1="484" x2="340" y2="542" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="354" y="516" dominant-baseline="central" font-size="12" fill="#5F5E5A">h_enc (T, d)</text>

<!-- PREDICTOR 컨테이너 -->
<rect x="40" y="484" width="240" height="160" rx="16" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text x="64" y="508" dominant-baseline="central" font-size="14" font-weight="500" fill="#712B13">Predictor (LM)</text>

<rect x="60" y="520" width="200" height="44" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text x="160" y="542" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#712B13">Token Embedding</text>

<line x1="160" y1="564" x2="160" y2="582" stroke="#993C1D" stroke-width="1.5" marker-end="url(#arrow-coral)"/>

<rect x="60" y="584" width="200" height="44" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text x="160" y="600" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#712B13">LSTM / Transformer</text>
<text x="160" y="618" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#993C1D">언어 컨텍스트 h_pred</text>

<!-- Predictor → Joint 화살표 -->
<line x1="280" y1="606" x2="378" y2="606" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="324" y="598" text-anchor="middle" font-size="12" fill="#5F5E5A">h_pred</text>

<!-- JOINT NETWORK 컨테이너 -->
<rect x="360" y="544" width="280" height="160" rx="16" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text x="382" y="568" dominant-baseline="central" font-size="14" font-weight="500" fill="#633806">Joint Network</text>

<rect x="378" y="582" width="244" height="44" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text x="500" y="600" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#633806">Tanh( W_enc·h + W_pred·h )</text>
<text x="500" y="618" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#854F0B">두 표현 결합 (덧셈 or concat)</text>

<line x1="500" y1="626" x2="500" y2="656" stroke="#854F0B" stroke-width="1.5" marker-end="url(#arrow-amber)"/>

<rect x="378" y="658" width="244" height="44" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text x="500" y="676" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#633806">Softmax (vocab + blank)</text>
<text x="500" y="694" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#854F0B">각 (t, u) 위치 확률 분포</text>

<!-- Joint → Beam Search -->
<line x1="500" y1="704" x2="500" y2="740" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Beam Search -->
<rect x="360" y="742" width="280" height="56" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="500" y="762" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#2C2C2A">Beam Search 디코딩</text>
<text x="500" y="782" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#5F5E5A">blank → 시간 전진 / 토큰 → Predictor 갱신</text>

<!-- Predictor 피드백 화살표 -->
<path d="M500 798 L500 810 L144 810 L144 520" fill="none" stroke="#993C1D" stroke-width="1.2" stroke-dasharray="5 4" marker-end="url(#arrow-coral)"/>
<text x="320" y="806" text-anchor="middle" font-size="12" fill="#993C1D">예측 토큰 피드백</text>

<!-- 범례 -->
<rect x="40" y="770" width="12" height="12" rx="2" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="58" y="776" dominant-baseline="central" font-size="12" fill="#444441">Encoder</text>
<rect x="120" y="770" width="12" height="12" rx="2" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text x="138" y="776" dominant-baseline="central" font-size="12" fill="#444441">Predictor</text>
<rect x="210" y="770" width="12" height="12" rx="2" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text x="228" y="776" dominant-baseline="central" font-size="12" fill="#444441">Joint</text>
<rect x="280" y="770" width="12" height="12" rx="2" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="298" y="776" dominant-baseline="central" font-size="12" fill="#444441">공통</text>
</svg>
